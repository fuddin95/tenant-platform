services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentaltrust
      POSTGRES_PASSWORD: rentaltrust
      POSTGRES_DB: rentaltrust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentaltrust"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rentaltrust:rentaltrust@postgres:5432/rentaltrust
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: http://localhost:3000
      AWS_REGION: ca-central-1
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_KMS_KEY_ID: ${AWS_KMS_KEY_ID}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://rentaltrust:rentaltrust@postgres:5432/rentaltrust
      PORT: 3001
      AWS_REGION: ca-central-1
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_KMS_KEY_ID: ${AWS_KMS_KEY_ID}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
